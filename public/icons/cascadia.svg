<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Forest backdrop, conifer cross-section evocation -->
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3F6147"/>
      <stop offset="1" stop-color="#1C2A20"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="url(#cg)"/>
  <!-- three abstracted falling blocks forming a conifer silhouette -->
  <g fill="#7A8E6A">
    <polygon points="512,180 350,420 674,420"/>
    <polygon points="512,360 290,620 734,620"/>
    <polygon points="512,540 230,820 794,820"/>
  </g>
  <!-- rescue accent block (one falling) -->
  <rect x="600" y="700" width="90" height="90" rx="6" fill="#C8531C" transform="rotate(8 645 745)"/>
  <!-- trunk -->
  <rect x="488" y="800" width="48" height="40" fill="#43342A"/>
</svg>
